seed: 42
device: auto

data:
  dataset_path: data/sensodat.json
  val_fraction: 0.2
  test_fraction: 0.0
  min_points: 3

model:
  d_seq: 4
  d_global: 4
  d_model: 64
  n_heads: 4
  n_layers: 3
  dim_feedforward: 256
  dropout: 0.1
  pooling: mean
  d_global_hidden: 32
  d_head_hidden: 64

train:
  epochs: 100
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  classification_loss_weight: 0.3
  ranking_loss_weight: 0.7
  grad_clip_norm: 1.0
  lr_scheduler: cosine
  early_stopping_patience: 15
  num_workers: 0

eval:
  batch_size: 128

output:
  dir: output
  checkpoint_name: best.pt
  onnx_name: rte4sdc.onnx
